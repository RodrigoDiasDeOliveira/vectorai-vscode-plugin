name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Tests
        run: npm test

      - name: Package Extension
        run: npm run package

      - name: Upload artifact (.vsix)
        uses: actions/upload-artifact@v4
        with:
          name: vector-ai-vscode-extension
          path: "*.vsix"
          retention-days: 7